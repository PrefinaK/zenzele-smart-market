<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Zenzele Smart Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-z">Z</span>enzele <span class="logo-tag">Smart Market</span></a>
    <div class="nav-links"><a href="register.html">No account? Join Free →</a></div>
  </div>
</nav>
<div class="auth-page">
  <div class="auth-card">
    <h2>👋 Welcome Back</h2>
    <p class="sub">Log in to your Zenzele Smart Market account.</p>
    <div id="alertBox"></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="your@email.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password"/></div>
    <button class="btn-primary btn-full" id="loginBtn" onclick="doLogin()">Login 🔑</button>
    <div style="margin:20px 0;text-align:center;color:#bbb;font-size:0.85rem">— or try a demo account —</div>
    <button class="btn-ghost btn-full" onclick="demoLogin()" style="text-align:center">🚀 Demo Login (no password needed)</button>
    <div class="form-footer" style="margin-top:16px">New here? <a href="register.html">Create a free account</a></div>
  </div>
</div>
<script src="../js/api-client.js"></script>
<script src="../js/main.js"></script>
<script>
async function doLogin() {
  const alertBox = document.getElementById('alertBox');
  const loginBtn = document.getElementById('loginBtn');
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  alertBox.innerHTML = '';
  if (!email || !password) {
    alertBox.innerHTML = '<div class="alert alert-error">Please enter your email and password.</div>'; return;
  }
  loginBtn.disabled = true; loginBtn.textContent = 'Logging in...';
  const result = await loginUser(email, password);
  if (result.success) {
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    window.location.href = redirect || 'dashboard.html';
  } else {
    alertBox.innerHTML = `<div class="alert alert-error">${result.error || 'Invalid email or password.'}</div>`;
    loginBtn.disabled = false; loginBtn.textContent = 'Login 🔑';
  }
}
function demoLogin() {
  const demo = getProfiles()[0];
  setUser(demo);
  window.location.href = 'dashboard.html';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
